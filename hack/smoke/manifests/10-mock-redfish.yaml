---
# Mock Redfish "BMC". Listens on :8443 with a self-signed cert generated at
# startup. Speaks the multi-vendor Redfish dialect from internal/redfishmock.
# The controller talks to this via insecureSkipVerify=true on the PhysicalHost
# (the cert is self-signed and ephemeral).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-redfish
  namespace: beskar7-smoke
  labels:
    app.kubernetes.io/name: mock-redfish
    app.kubernetes.io/part-of: beskar7
    app.kubernetes.io/component: smoke-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-redfish
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-redfish
        app.kubernetes.io/part-of: beskar7
        app.kubernetes.io/component: smoke-test
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mock-redfish
        # Default image. hack/smoke/run.sh auto-derives the tag from the
        # installed controller (so the mock always matches the chart in use)
        # and overrides this field on apply. The literal below is only used
        # when the runner is bypassed (e.g. plain `kubectl apply -f hack/smoke/manifests/`).
        # Bump it in lockstep with each release as a sane fallback.
        image: ghcr.io/projectbeskar/beskar7/mock-redfish:v0.4.0-alpha.3
        imagePullPolicy: IfNotPresent
        args:
        - --listen-addr=:8443
        - --vendor=Generic
        - --tls=true
        - --cert-san=mock-redfish.beskar7-smoke.svc
        - --cert-san=mock-redfish.beskar7-smoke.svc.cluster.local
        - --username=admin
        - --password=password123
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
---
apiVersion: v1
kind: Service
metadata:
  name: mock-redfish
  namespace: beskar7-smoke
  labels:
    app.kubernetes.io/name: mock-redfish
    app.kubernetes.io/part-of: beskar7
    app.kubernetes.io/component: smoke-test
spec:
  type: ClusterIP
  ports:
  - port: 8443
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    app.kubernetes.io/name: mock-redfish
