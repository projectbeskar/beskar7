# golangci-lint v2 configuration. CI and `make lint` pin the v2 binary
# (see .github/workflows/ci.yml and Makefile GOLANGCI_LINT_VERSION).
#
# The `standard` default set is errcheck, govet, ineffassign, staticcheck,
# and unused — equivalent to the previous v1 list once gosimple (folded into
# staticcheck) and typecheck (always-on in v2) are accounted for.
version: "2"

run:
  tests: true

linters:
  default: standard
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
