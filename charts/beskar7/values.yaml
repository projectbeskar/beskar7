# Default values for beskar7.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Controller manager configuration
controllerManager:
  replicas: 1
  image:
    repository: ghcr.io/projectbeskar/beskar7/beskar7
    tag: "" # Will be set to Chart.appVersion by default
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  # Additional environment variables for the controller
  env: []
  # - name: CONTROLLER_LOG_LEVEL
  #   value: "info"


serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Pod-level security context. fsGroup and runAsGroup must be set so the
# non-root container (UID 65532, GID 65532) can read the webhook serving cert
# Secret mounted at /tmp/k8s-webhook-server/serving-certs. The Secret volume
# uses defaultMode 0400 (owner-only) to match config/manager/manager.yaml;
# without fsGroup the kubelet leaves the files as root:root and the manager
# crashes with "permission denied" on the eager TLS load in the inspection
# callback server. seccompProfile is required by the Restricted PSA profile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

# Webhook configuration
webhook:
  enabled: true
  failurePolicy: Fail
  matchPolicy: Equivalent
  admissionReviewVersions:
    - v1
  service:
    name: beskar7-webhook-service
    # namespace is derived from namespace.name; do not set it here.
    port: 443
    targetPort: 9443

# Certificate manager configuration
certManager:
  enabled: true
  issuer:
    name: beskar7-selfsigned-issuer
    kind: ClusterIssuer
  certificate:
    name: beskar7-serving-cert
    secretName: beskar7-webhook-server-cert
    duration: 8760h # 1 year
    renewBefore: 720h # 30 days

# Namespace configuration. `create: false` is the default so that the standard
# `helm install --create-namespace` flow works without a conflict on the
# chart-rendered Namespace resource. Set `create: true` only if you install
# without `--create-namespace` and want the chart to render the Namespace.
namespace:
  create: false
  name: beskar7-system

# RBAC configuration
rbac:
  create: true

# Namespaces the controller watches. When empty (default), the chart creates
# a cluster-scoped ClusterRole + ClusterRoleBinding granting the manager
# access to ALL Secrets/ConfigMaps/Beskar7 CRDs across all namespaces — the
# historical behavior. When set to a non-empty list, RBAC narrows to
# per-namespace Role/RoleBinding pairs in each listed namespace plus a
# leader-election Role in the operator's own namespace; the cluster-wide
# binding is replaced with a minimal ClusterRole covering only the genuinely
# cluster-scoped reads (ClusterRoles/ClusterRoleBindings) that the manager
# requires.
#
# The same list is passed to the manager via --watch-namespaces so its cache
# informers scope to these namespaces. Beskar7 CRs (PhysicalHost, Beskar7Machine,
# Beskar7Cluster, Beskar7MachineTemplate) and their associated CAPI Machines
# must live in one of the watched namespaces; objects elsewhere are ignored.
#
# Example:
#   watchNamespaces:
#     - default
#     - tenant-a
#     - tenant-b
watchNamespaces: []

# Network policies
networkPolicy:
  enabled: false

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}

# Node selector, tolerations and affinity
nodeSelector: {}

tolerations: []

affinity: {}

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

bootstrap:
  # Base URL operators expose for the bootstrap and inspection callback endpoints.
  # Beskar7 computes per-machine bootstrap URLs from this base. Set to whatever
  # FQDN+port your hosts can reach the manager on (typically the in-cluster
  # service DNS, but may be a Service of type LoadBalancer or an external Ingress
  # for hosts that boot before joining the cluster network).
  urlBase: "https://beskar7-controller-manager.beskar7-system.svc:8082"

# Additional labels
labels: {}

# Additional annotations
annotations: {}
