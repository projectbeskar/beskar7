{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "beskar7.fullname" . }}-manager-role
  labels:
    {{- include "beskar7.labels" . | nindent 4 }}
rules:
# ConfigMaps: only fetched by name (inspection-result handoff) and
# create/update/delete on the same. No informer; list/watch intentionally
# omitted (SEC-2 / D-007).
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
# Secrets: get for BMC credentials and bootstrap data (by name);
# create/update/patch/delete for the per-host bootstrap-token Secret.
# list/watch are required because PhysicalHostReconciler.SetupWithManager
# registers a .Watches(&corev1.Secret{}, ...) informer for credential
# rotation. SEC-2 residual scope after PR-7 (D-007).
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - clusters/status
  - machines
  - machines/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - beskar7clusters
  - beskar7machines
  - physicalhosts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - beskar7clusters/finalizers
  - beskar7machines/finalizers
  - physicalhosts/finalizers
  verbs:
  - update
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - beskar7clusters/status
  - beskar7machines/status
  - physicalhosts/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - beskar7machinetemplates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "beskar7.fullname" . }}-manager-rolebinding
  labels:
    {{- include "beskar7.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "beskar7.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "beskar7.serviceAccountName" . }}
  namespace: {{ include "beskar7.namespace" . }}
{{- end }}
