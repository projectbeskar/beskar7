apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beskar7.fullname" . }}-controller-manager
  namespace: {{ include "beskar7.namespace" . }}
  labels:
    {{- include "beskar7.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      {{- include "beskar7.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "beskar7.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "beskar7.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: manager
        image: {{ include "beskar7.controllerImage" . }}
        imagePullPolicy: {{ .Values.controllerManager.image.pullPolicy }}
        args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        - --leader-elect
        - --bootstrap-url-base={{ .Values.bootstrap.urlBase | default "https://beskar7-controller-manager.beskar7-system.svc:8082" }}
        # The callback server (inspection POST + bootstrap GET) shares the cert
        # mount with the webhook server because both run in the same Pod under
        # the same DNS name. The cert dir is therefore always required; it is
        # provided by cert-manager regardless of whether webhook admission is on.
        - --inspection-cert-dir=/tmp/k8s-webhook-server/serving-certs
        {{- if .Values.webhook.enabled }}
        - --enable-webhook=true
        - --webhook-port=9443
        {{- end }}
        ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8081
          name: healthz
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.controllerManager.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        # The cert volume is mounted unconditionally because the callback server
        # (inspection POST + bootstrap GET on :8082) requires TLS regardless of
        # whether webhook admission is enabled. Both servers share the same cert
        # issued by cert-manager. Operators must have certManager.enabled=true.
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        {{- if .Values.controllerManager.env }}
        env:
          {{- toYaml .Values.controllerManager.env | nindent 10 }}
        {{- end }}
      volumes:
      - name: cert
        secret:
          # 0400 in octal = 256 in decimal. defaultMode 420 = 0644 in octal.
          # Use 256 to match the kustomize config/manager/manager.yaml setting.
          defaultMode: 256
          secretName: {{ .Values.certManager.certificate.secretName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
