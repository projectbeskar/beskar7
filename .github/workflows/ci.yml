name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/beskar7

jobs:
  # Job 1: Code Quality and Linting
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Install dependencies
      run: |
        go mod download
        # Pin to CI-known-good version to avoid config incompatibilities
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
        
    - name: Run golangci-lint
      run: golangci-lint run --verbose --timeout=5m
      
    - name: Check Go mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
        
    - name: Check formatting (exclude vendor)
      shell: bash
      run: |
        set -euo pipefail
        FILES=$(git ls-files '*.go' | grep -v '^vendor/' || true)
        if [ -z "$FILES" ]; then exit 0; fi
        DIFF=$(gofmt -s -d $FILES)
        if [ -n "$DIFF" ]; then
          echo "$DIFF"
          echo "Go code is not formatted properly. Run 'gofmt -s -w .'"
          exit 1
        fi

  # Job 2: Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  # Job 3: Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        
    - name: Install dependencies
      run: go mod download
      
    - name: Set up envtest (etcd, kube-apiserver)
      run: |
        # setup-envtest is now a separate submodule inside controller-runtime;
        # its tags do NOT match controller-runtime release tags. Use the
        # release-0.20 branch which matches our controller-runtime v0.20.x.
        # See https://github.com/kubernetes-sigs/controller-runtime/blob/main/tools/setup-envtest/README.md.
        # @latest must NOT be used — it currently resolves to a Go 1.26-required
        # build that ships envtest assets without the etcd binary.
        go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.20
        export KUBEBUILDER_ASSETS=$(setup-envtest use 1.31.x -p path)
        echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> $GITHUB_ENV

    - name: Run unit tests
      run: |
        # Run tests with coverage, excluding integration tests
        go test -v -race -coverprofile=coverage.out -covermode=atomic \
          $(go list ./... | grep -v /test/integration)
          
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        
    - name: Generate coverage report
      run: |
        go tool cover -html=coverage.out -o coverage.html
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.go-version }}
        path: coverage.html

  # Job 4: Integration Tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Set up envtest (etcd, kube-apiserver)
      run: |
        # See unit-tests job for the @release-0.20 rationale.
        go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.20
        export KUBEBUILDER_ASSETS=$(setup-envtest use 1.31.x -p path)
        echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> $GITHUB_ENV

    - name: Run integration tests
      run: |
        go test -v -tags=integration ./test/integration/... -timeout=30m
        
  # Job 5: Build and Test Container Image
  container:
    name: Container Build and Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build container image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64  # Single platform for CI scanning
        push: false
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true  # Load the image to local Docker daemon for scanning
        
    - name: Run container security scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
        format: 'sarif'
        output: 'container-scan.sarif'
        
    - name: Upload container scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'container-scan.sarif'

  # Job 6: Generate and Validate Manifests
  manifests:
    name: Generate and Validate Manifests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Install dependencies
      run: |
        go mod download
        make install-controller-gen
        
    - name: Generate manifests
      run: make manifests
      
    - name: Verify no changes
      run: |
        git diff --exit-code
        if [ $? -ne 0 ]; then
          echo "Generated manifests are out of date. Please run 'make manifests' and commit the changes."
          exit 1
        fi
        
    - name: Validate CRDs
      run: |
        # Validate CRD syntax using kubeval as client-side validation
        go install github.com/instrumenta/kubeval@latest
        $GOPATH/bin/kubeval --strict --ignore-missing-schemas config/crd/bases/*.yaml || true
        
    - name: Generate release manifests
      run: |
        # Use a fixed version for CI testing
        export VERSION=v0.0.0-ci
        make release-manifests
      
    - name: Upload release manifests
      uses: actions/upload-artifact@v4
      with:
        name: release-manifests
        path: beskar7-manifests-v0.0.0-ci.yaml

  # Job 7: End-to-End Smoke Test
  #
  # Spins up a kind cluster, installs cert-manager + Cluster API core, builds
  # the controller + mock-redfish images locally and loads them into the
  # kind node, installs the in-tree Helm chart, then runs `make smoke` end
  # to end. This exercises:
  #
  #   - Helm chart packaging + values (catches chart-level regressions like
  #     the v0.4.0-alpha.1 fsGroup bug that would crashloop the manager)
  #   - Webhook + CRD validation
  #   - Redfish reconcile path against an in-cluster fake BMC
  #   - CAPI claim path (Beskar7Machine -> PhysicalHost consumerRef +
  #     state machine progression)
  #
  # This replaces the previous ad-hoc PhysicalHost-against-test.example.com
  # check, which only verified webhook admission. Layer 5 (full PXE +
  # inspector callback) still requires real hardware or sushy-tools and
  # is not covered here.
  e2e-setup:
    name: E2E Setup Validation
    runs-on: ubuntu-latest
    needs: [manifests, container]
    steps:
    - uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: beskar7-smoke
        kubectl_version: v1.31.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build controller image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: false
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:smoke-ci
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build mock-redfish image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.mock-redfish
        platforms: linux/amd64
        push: false
        # IMAGE_NAME is "<repo>/beskar7" (with the /beskar7 suffix); the mock
        # image lives at "<repo>/mock-redfish". Build using github.repository
        # directly to avoid string surgery on IMAGE_NAME.
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/mock-redfish:smoke-ci
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Load images into kind
      run: |
        kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:smoke-ci --name beskar7-smoke
        kind load docker-image ${{ env.REGISTRY }}/${{ github.repository }}/mock-redfish:smoke-ci --name beskar7-smoke

    - name: Install cert-manager
      run: |
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.1/cert-manager.yaml
        kubectl wait --for=condition=Available --timeout=300s deployment/cert-manager -n cert-manager
        kubectl wait --for=condition=Available --timeout=300s deployment/cert-manager-cainjector -n cert-manager
        kubectl wait --for=condition=Available --timeout=300s deployment/cert-manager-webhook -n cert-manager

    - name: Install Cluster API core via clusterctl
      run: |
        # Latest stable clusterctl. Installs cluster-api core + kubeadm
        # bootstrap + kubeadm control-plane providers. Required for smoke
        # layer 4 (CAPI Cluster/Machine reconcile against beskar7 infra).
        CLUSTERCTL_VERSION=v1.10.1
        curl -L -o /tmp/clusterctl "https://github.com/kubernetes-sigs/cluster-api/releases/download/${CLUSTERCTL_VERSION}/clusterctl-linux-amd64"
        chmod +x /tmp/clusterctl
        sudo mv /tmp/clusterctl /usr/local/bin/clusterctl
        clusterctl version
        clusterctl init
        # Wait for all CAPI controllers to be ready
        for ns in capi-system capi-kubeadm-bootstrap-system capi-kubeadm-control-plane-system; do
          kubectl wait --for=condition=Available --timeout=300s deployment --all -n "$ns"
        done

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: '3.12.1'

    - name: Install Beskar7 chart (Helm)
      run: |
        helm install beskar7 ./charts/beskar7 \
          --namespace beskar7-system --create-namespace \
          --set controllerManager.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set controllerManager.image.tag=smoke-ci \
          --set controllerManager.image.pullPolicy=Never \
          --wait --timeout=5m
        kubectl -n beskar7-system get pods,deploy,svc

    - name: Run make smoke
      run: |
        # The smoke runner auto-derives the mock image from the controller
        # image (same registry path, mock-redfish kind, same tag). We loaded
        # mock-redfish:smoke-ci into kind above, so this resolves locally
        # without registry pulls.
        make smoke

    - name: Diagnostics on failure
      if: failure()
      run: |
        echo "=== Cluster context ==="
        kubectl cluster-info
        echo "=== Pods (all namespaces) ==="
        kubectl get pods -A -o wide
        echo "=== Beskar7 controller log (last 500) ==="
        kubectl -n beskar7-system logs deploy/beskar7-controller-manager --tail=500 || true
        echo "=== Mock-redfish log ==="
        kubectl -n beskar7-smoke logs deploy/mock-redfish --tail=100 || true
        echo "=== PhysicalHost ==="
        kubectl -n beskar7-smoke get physicalhost -o yaml || true
        echo "=== Beskar7Machine ==="
        kubectl -n beskar7-smoke get beskar7machine -o yaml || true
        echo "=== bootstrap-token Secret (smoke fixture; not real secret) ==="
        kubectl -n beskar7-smoke get secret smoke-host-01-bootstrap-token -o yaml || true
        echo "=== Events ==="
        kubectl get events -A --sort-by='.lastTimestamp' | tail -30
        echo "=== Images on kind node ==="
        docker exec beskar7-smoke-control-plane crictl images | grep -E "beskar7|mock-redfish" || true

  # Job 8: Performance Benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Run benchmarks
      run: |
        go test -bench=. -benchmem -run=^$ ./... > benchmark.txt
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.txt

  # Summary Job
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, security, test, integration-test, container, manifests, e2e-setup]
    if: always()
    steps:
    - name: Check all jobs status
      run: |
        if [[ "${{ needs.lint.result }}" != "success" || \
              "${{ needs.security.result }}" != "success" || \
              "${{ needs.test.result }}" != "success" || \
              "${{ needs.integration-test.result }}" != "success" || \
              "${{ needs.container.result }}" != "success" || \
              "${{ needs.manifests.result }}" != "success" || \
              "${{ needs.e2e-setup.result }}" != "success" ]]; then
          echo "One or more critical jobs failed"
          exit 1
        fi
        echo "All critical CI jobs passed successfully!" 